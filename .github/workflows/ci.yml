name: LexFlow Frontend · CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & Test (Angular)
    runs-on: ubuntu-latest
    strategy:
      matrix: { node: [20] }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (headless)
        run: npm test -- --watch=false --browsers=ChromeHeadless || echo "sin pruebas configuradas"

      - name: Build producción
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lexflow-frontend-dist
          path: dist/
          retention-days: 7

  deploy:
    name: Deploy
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lexflow-frontend-dist
          path: dist/

      # Despliegue estático (Netlify/Vercel/Firebase Hosting): requiere secreto del proveedor.
      - name: Deploy summary
        run: echo "✅ LexFlow frontend construido desde commit ${{ github.sha }}"
