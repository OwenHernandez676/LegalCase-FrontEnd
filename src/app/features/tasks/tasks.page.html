<lex-page-head title="Mis Tareas" sub="Pendientes operativos de sus expedientes"
  [crumbs]="['LEGALCASE','Mi Espacio','Tareas']" />

<lex-panel [noPad]="true">
  @for (t of tasks(); track t.id) {
    <div class="task" [class.done]="t.completada">
      <button class="cbox" [class.on]="t.completada" (click)="toggle(t.id)">
        @if (t.completada) { <lex-icon name="check" [size]="13" color="#fff" /> }</button>
      <div style="flex:1">
        <div class="tt">{{ t.titulo }}</div>
        <span class="case-id">{{ t.caseId }}</span></div>
      <lex-priority-chip [priority]="t.prioridad" />
      <span class="due"><lex-icon name="clock" [size]="13" /> {{ t.due }}</span>
    </div>
  }
</lex-panel>

<style>
  .task{display:flex;align-items:center;gap:14px;padding:15px 20px;border-bottom:1px solid var(--line)}
  .task.done .tt{text-decoration:line-through;color:var(--ink-faint)}
  .cbox{width:22px;height:22px;border-radius:7px;border:2px solid var(--line-strong);display:grid;place-items:center;flex:none}
  .cbox.on{background:var(--success);border-color:var(--success)}
  .tt{font-size:13.5px;font-weight:600;margin-bottom:3px}
  .due{font-size:12px;color:var(--ink-soft);display:flex;align-items:center;gap:4px;width:80px}
</style>
