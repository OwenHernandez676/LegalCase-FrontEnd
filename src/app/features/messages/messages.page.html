<lex-page-head title="Mensajes" sub="Comunicación segura cliente · abogado"
  [crumbs]="['LEGALCASE','Comunicación','Mensajes']" />

<div class="chat panel">
  <aside class="contacts">
    @for (c of contacts; track c.name) {
      <div class="contact" [class.active]="c.active">
        <lex-avatar [name]="c.name" [size]="40" />
        <div style="flex:1;min-width:0"><b>{{ c.name }}</b><span>{{ c.last }}</span></div>
        @if (c.unread) { <span class="badge">{{ c.unread }}</span> }
      </div>
    }
  </aside>

  <section class="thread">
    <div class="t-head"><lex-avatar name="Rodrigo Castellanos" [size]="38" />
      <div><b>Lic. Rodrigo Castellanos</b><span class="muted" style="font-size:11.5px">Derecho Laboral · EXP-2047</span></div></div>

    <div class="t-body">
      @for (m of messages(); track m.id) {
        <div class="bubble" [class.mine]="m.me"><p>{{ m.text }}</p><span>{{ m.time }}</span></div>
      }
    </div>

    <div class="t-input">
      <input class="input" placeholder="Escriba un mensaje…" [(value)]="draft"
        #d (input)="draft = d.value" (keyup.enter)="send(); d.value=''" />
      <button class="btn btn-gold" (click)="send(); d.value=''"><lex-icon name="send" [size]="16" /></button>
    </div>
  </section>
</div>

<style>
  .chat{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 200px);min-height:460px;overflow:hidden}
  .contacts{border-right:1px solid var(--line);overflow-y:auto}
  .contact{display:flex;align-items:center;gap:11px;padding:14px 16px;border-bottom:1px solid var(--line);cursor:pointer}
  .contact:hover{background:var(--surface-2)}.contact.active{background:var(--gold-wash)}
  .contact b{font-size:13px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .contact span{font-size:11.5px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
  .contact .badge{background:var(--gold);color:var(--navy);min-width:18px;height:18px;border-radius:100px;font-size:10px;font-weight:700;display:grid;place-items:center}
  .thread{display:flex;flex-direction:column}
  .t-head{display:flex;align-items:center;gap:11px;padding:14px 18px;border-bottom:1px solid var(--line)}
  .t-head b{font-size:14px;display:block}
  .t-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;background:var(--surface-2)}
  .bubble{max-width:70%;padding:10px 14px;border-radius:14px;background:var(--surface);border:1px solid var(--line);align-self:flex-start}
  .bubble.mine{align-self:flex-end;background:var(--navy-2);color:#EAF0F6;border-color:var(--navy-2)}
  .bubble p{font-size:13px;line-height:1.4}.bubble span{font-size:10px;opacity:.6;display:block;text-align:right;margin-top:3px}
  .t-input{display:flex;gap:10px;padding:14px 18px;border-top:1px solid var(--line)}
  .t-input .input{flex:1}
  @media(max-width:720px){.chat{grid-template-columns:1fr}.contacts{display:none}}
</style>
